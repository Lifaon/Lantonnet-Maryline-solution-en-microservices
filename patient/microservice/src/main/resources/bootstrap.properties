spring.application.name=patient-microservice
spring.cloud.config.uri=http://localhost:9101
eureka.client.serviceUrl.defaultZone=http://localhost:9102/eureka/

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_HOST}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
